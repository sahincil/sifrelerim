<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A12;--card:#13131E;--card2:#1A1A28;--card3:#222235;
  --accent:#8B5CF6;--accent2:#7C3AED;--acbg:rgba(139,92,246,0.12);
  --txt:#EEEEF5;--txt2:#8888A8;--txt3:#505065;
  --brd:rgba(139,92,246,0.18);--brd2:rgba(255,255,255,0.07);
  --grn:#10B981;--red:#F87171;--amb:#FBBF24;
  --r:14px;--rsm:10px;--rxl:22px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html{height:100%;background:var(--bg)}
body{
  height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  overflow:hidden;
}
#app{
  width:100%;max-width:430px;height:100vh;
  margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
.screen{
  display:none;flex-direction:column;
  height:100%;position:absolute;top:0;left:0;right:0;bottom:0;
  animation:fi .2s ease;
}
.screen.active{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sbar{
  padding-top:var(--safe-top);
  height:calc(44px + var(--safe-top));
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 20px 8px;
  flex-shrink:0;
}
.sbar-l{font-size:15px;font-weight:600;color:var(--txt)}
.sbar-r{font-size:12px;color:var(--txt2);display:flex;gap:8px;align-items:center}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scrl::-webkit-scrollbar{display:none}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 24px;border-radius:var(--rxl);border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;outline:none;width:100%;font-family:inherit}
.btn:active{transform:scale(.97)}
.bpri{background:var(--accent);color:#fff}
.bpri:hover{background:var(--accent2)}
.bghost{background:transparent;color:var(--txt2);border:1.5px solid var(--brd2)}
.bghost:hover{background:var(--card2)}
.bico{width:40px;height:40px;border-radius:50%;background:var(--card2);border:1px solid var(--brd2);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;outline:none;flex-shrink:0;padding:0}
.bico:hover{background:var(--card3);color:var(--txt)}
.ig{margin-bottom:14px}
.lbl{font-size:13px;color:var(--txt2);margin-bottom:6px;display:block;font-weight:500}
.inp{width:100%;background:var(--card2);border:1.5px solid var(--brd2);border-radius:var(--r);padding:13px 16px;color:var(--txt);font-size:15px;outline:none;transition:border-color .15s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inprow{position:relative}
.inprow .inp{padding-right:50px}
.ipico{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;padding:4px;outline:none}
.card{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.card:hover{background:var(--card2);border-color:var(--accent)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ce{background:rgba(59,130,246,.15);color:#60A5FA}
.cs{background:rgba(236,72,153,.15);color:#F472B6}
.cb{background:rgba(16,185,129,.15);color:#34D399}
.ca{background:rgba(245,158,11,.15);color:#FCD34D}
.co{background:rgba(139,92,246,.15);color:#A78BFA}
.fab{position:absolute;right:20px;bottom:calc(24px + var(--safe-bot));width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(139,92,246,.5);transition:all .15s;outline:none;z-index:10}
#toast{position:fixed;bottom:calc(80px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--card3);border:1px solid var(--brd);color:var(--txt);padding:10px 20px;border-radius:30px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}
.strbar{height:4px;border-radius:2px;margin-top:8px;background:var(--card3)}.strfill{height:100%;border-radius:2px;transition:all .3s;width:0}
.trrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--brd2)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--card3);border:none;cursor:pointer;position:relative;transition:background .2s;outline:none}
.toggle.on{background:var(--accent)}.tthumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;pointer-events:none}
.toggle.on .tthumb{left:23px}
.dfld{background:var(--card);border:1.5px solid var(--brd2);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.dfld-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;font-weight:600}

.catscrl{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch}
.shdr{padding:0 20px;flex-shrink:0}
</style>

<script>
'use strict';

// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyA5N2FSLqPicNeBaBi3Ehj0iPG6HOUD98",
  authDomain: "veriler-7a724.firebaseapp.com",
  databaseURL: "https://veriler-7a724-default-rtdb.firebaseio.com",
  projectId: "veriler-7a724",
  storageBucket: "veriler-7a724.appspot.com",
  messagingSenderId: "17059149175",
  appId: "1:17059149175:web:3bab6f4a5fece2819755"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ENC=new TextEncoder(),DEC=new TextDecoder();
let mKey=null,vItems=[],editId=null,actFlt='',cbTimer=null;
const CLB={email:'E-posta',social:'Sosyal',bank:'Banka',api:'API',other:'Diğer'},CIC={email:'📧',social:'💬',bank:'🏦',api:'⚙️',other:'🔑'},CCL={email:'ce',social:'cs',bank:'cb',api:'ca',other:'co'};

// Crypto Logic
async function dkey(pw,salt){
  const km=await crypto.subtle.importKey('raw',ENC.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function aenc(txt,key){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,ENC.encode(txt));
  return{iv:b64e(iv),ct:b64e(new Uint8Array(ct))};
}
async function adec(d,key){
  try{
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(d.iv)},key,b64d(d.ct));
    return DEC.decode(pt);
  }catch(e){return '[Hatalı]';}
}
const b64e=u=>btoa(String.fromCharCode(...u)),b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0)),uid=()=>crypto.randomUUID();

function gt(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function toast(m,dur=2600){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),dur)}
function tvs(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈'}
function chkStr(){
  const pw=document.getElementById('su-pw').value;let s=0;
  if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const cols=['#EF4444','#F59E0B','#FBBF24','#10B981','#10B981'],labs=['Çok Zayıf','Zayıf','Orta','Güçlü','Çok Güçlü'];
  const f=document.getElementById('sfill');f.style.width=(s/5*100)+'%';f.style.background=cols[s-1]||'var(--card3)';
  const l=document.getElementById('slbl');l.textContent=s>0?labs[s-1]:'';l.style.color=cols[s-1]||'var(--txt2)';
}

async function setupVault(){
  const pw=document.getElementById('su-pw').value.trim(),pw2=document.getElementById('su-pw2').value;
  if(pw.length<8){toast('Şifre en az 8 karakter olmalı');return;}
  if(pw!==pw2){toast('Şifreler eşleşmiyor');return;}
  try {
    const salt=crypto.getRandomValues(new Uint8Array(16));
    mKey=await dkey(pw,salt);
    const vrf=await aenc('AGVAULT_OK_V1',mKey);
    await db.ref('vault_meta').set({salt:b64e(salt),vrf});
    await db.ref('vault_items').set({});
    vItems=[];rndr();gt('s-vault');toast('Kasa bulutta oluşturuldu ✓');
  } catch(e) { toast('Hata oluştu'); }
}

async function unlock(){
  const pw=document.getElementById('lk-pw').value;
  if(!pw){toast('Şifre gir');return;}
  try {
    const snap=await db.ref('vault_meta').once('value');const meta=snap.val();
    if(!meta)throw 0;
    const key=await dkey(pw,b64d(meta.salt));
    if(await adec(meta.vrf,key)!=='AGVAULT_OK_V1')throw 0;
    mKey=key;await loadItems();gt('s-vault');
  } catch(e) {toast('Yanlış şifre veya kasa bulunamadı ❌');}
}

async function loadItems(){
  try {
    const snap=await db.ref('vault_items').once('value');const raw=snap.val();
    if(!raw){vItems=[];rndr();return;}
    const enc_items=Object.values(raw);
    vItems=await Promise.all(enc_items.map(async it=>({
      ...it,password:await adec(it.pe,mKey),notes:it.ne?await adec(it.ne,mKey):'',pe:undefined,ne:undefined
    })));
    rndr();
  } catch(e) {vItems=[];rndr();}
}

async function persist(){
  const ep={};
  for(let i=0; i<vItems.length; i++){
    const it = vItems[i];
    ep[it.id] = {title:it.title,username:it.username,category:it.category,createdAt:it.createdAt,updatedAt:it.updatedAt,pe:await aenc(it.password||'',mKey),ne:await aenc(it.notes||'',mKey)};
  }
  await db.ref('vault_items').set(ep);
}

function sflt(c){actFlt=c;rndr()}
function rndr(){
  const q=(document.getElementById('srch')||{value:''}).value.toLowerCase().trim();
  const filtered=vItems.filter(it=>(!actFlt||it.category===actFlt)&&(!q||it.title.toLowerCase().includes(q)||it.username.toLowerCase().includes(q)));
  document.getElementById('ic').textContent=vItems.length+' kayıt';
  const list=document.getElementById('ilist');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div style="font-size:48px;opacity:.25">${!vItems.length?'🔐':'🔍'}</div><div style="font-size:15px;font-weight:600;color:var(--txt2)">${!vItems.length?'Kasa Boş':'Sonuç Yok'}</div></div>`;return;
  }
  list.innerHTML=filtered.map(it=>`<div class="card" onclick="openDetail('${it.id}')"><div style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:14px;background:var(--acbg);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${CIC[it.category]||'🔑'}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;margin-bottom:2px">${esc(it.title)}</div><div style="font-size:12px;color:var(--txt2)">${esc(it.username)||'—'}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><span class="badge ${CCL[it.category]||'co'}">${CLB[it.category]||'Diğer'}</span><button style="background:none;border:none;color:var(--txt3);cursor:pointer" onclick="event.stopPropagation();doCpy(vItems.find(x=>x.id==='${it.id}')?.password||'')">📋</button></div></div></div>`).join('');
}

function openDetail(id){
  const it=vItems.find(i=>i.id===id);if(!it)return;
  editId=id;document.getElementById('dtitle').textContent=it.title;
  document.getElementById('dico').textContent=CIC[it.category]||'🔑';
  const db_badge=document.getElementById('dbadge');db_badge.textContent=CLB[it.category]||'Diğer';db_badge.className='badge '+(CCL[it.category]||'co');
  document.getElementById('dflds').innerHTML=dFld('Kullanıcı',it.username||'—',id,'u',false)+dFld('Şifre',it.password||'',id,'p',true)+(it.notes?dFld('Not',it.notes,id,'n',false):'');
  gt('s-detail');
}
function dFld(lbl,val,id,fld,isPw){
  return`<div class="dfld"><div class="dfld-label">${lbl}</div><div style="display:flex;align-items:center;gap:10px"><div id="dv-${id}-${fld}" style="flex:1;font-size:14px;color:var(--txt);${isPw?'font-family:monospace':''}"> ${isPw?'••••••••••':esc(val)}</div><div style="display:flex;gap:6px">${isPw?`<button class="bico" style="width:32px;height:32px;font-size:13px" onclick="tFV('${id}','${fld}','${esc(val).replace(/'/g,'\\x27')}')">👁</button>`:''} <button class="bico" style="width:32px;height:32px;font-size:13px" onclick="doCpy('${esc(val).replace(/'/g,'\\x27')}')">📋</button></div></div></div>`;
}
function tFV(id,fld,val){const k=id+fld;fvState[k]=!fvState[k];document.getElementById('dv-'+id+'-'+fld).textContent=fvState[k]?val:'••••••••••';}

function openAdd(){
  editId=null;document.getElementById('ftitle').textContent='Yeni Şifre';
  ['f-t','f-u','f-p','f-n'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-c').value='other';document.getElementById('sbtn').textContent='Kaydet';
  document.getElementById('dbtn').style.display='none';document.getElementById('delconf').style.display='none';
  gt('s-form');
}
function openEdit(){
  const it=vItems.find(i=>i.id===editId);if(!it)return;
  document.getElementById('ftitle').textContent='Düzenle';
  document.getElementById('f-t').value=it.title;
  document.getElementById('f-c').value=it.category||'other';
  document.getElementById('f-u').value=it.username||'';
  document.getElementById('f-p').value=it.password||'';
  document.getElementById('f-n').value=it.notes||'';
  document.getElementById('sbtn').textContent='Güncelle';
  document.getElementById('dbtn').style.display='flex';
  document.getElementById('delconf').style.display='none';
  gt('s-form');
}

async function saveE(){
  const title=document.getElementById('f-t').value.trim();if(!title){toast('Site adı gerekli');return;}
  const e={title,category:document.getElementById('f-c').value,username:document.getElementById('f-u').value.trim(),password:document.getElementById('f-p').value,notes:document.getElementById('f-n').value.trim()};
  if(editId){const i=vItems.findIndex(x=>x.id===editId);if(i>=0)vItems[i]={...vItems[i],...e,updatedAt:Date.now()};}
  else vItems.unshift({id:uid(),...e,createdAt:Date.now(),updatedAt:Date.now()});
  try{await persist();rndr();gt('s-vault');toast(editId?'Güncellendi ✓':'Eklendi ✓');}catch(e){toast('Kayıt hatası');}
}

function delEConfirm(){document.getElementById('delconf').style.display='block';}
async function delE(){vItems=vItems.filter(i=>i.id!==editId);await persist();rndr();gt('s-vault');toast('Sildi');}

const UP='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LO='abcdefghijklmnopqrstuvwxyz',NU='0123456789',SY='!@#$%^&*()_+-=[];:,.<>?';
function genPw(){
  const len=parseInt(document.getElementById('glen').value);let cs='';
  if(document.getElementById('tu').classList.contains('on'))cs+=UP;
  if(document.getElementById('tl').classList.contains('on'))cs+=LO;
  if(document.getElementById('tn').classList.contains('on'))cs+=NU;
  if(document.getElementById('ts').classList.contains('on'))cs+=SY;
  if(!cs)cs=LO;const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  const pw=Array.from(arr).map(n=>cs[n%cs.length]).join('');document.getElementById('gpw').textContent=pw;
  const bits=Math.log2(cs.length)*len;const sl=document.getElementById('gstr');
  const[lbl,col]=bits<40?['Zayıf','#F87171']:bits<60?['Orta','#FBBF24']:bits<80?['Güçlü','#10B981']:['Çok Güçlü','#8B5CF6'];
  sl.textContent=lbl+' — '+Math.round(bits)+' bit entropi';sl.style.color=col;
}
function cpyGen(){const pw=document.getElementById('gpw').textContent;if(pw!=='-')doCpy(pw);}
function topt(b){b.classList.toggle('on');}
function genInto(){
  const cs=UP+LO+NU+SY;const arr=new Uint32Array(16);crypto.getRandomValues(arr);
  const pw=Array.from(arr).map(n=>cs[n%cs.length]).join('');
  const i=document.getElementById('f-p');i.value=pw;i.type='text';
  toast('Şifre üretildi ✓');setTimeout(()=>{i.type='password';},3000);
}

function doCpy(txt){
  const ok=()=>{ toast('Kopyalandı 📋');if(cbTimer)clearTimeout(cbTimer);cbTimer=setTimeout(()=>navigator.clipboard?.writeText('').catch(()=>{}),15000);};
  const fb=()=>{try{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px;top:-9999px';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();}catch{toast('Kopyalama başarısız');}};
  if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(txt).then(ok).catch(fb);
  else fb();
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Init
genPw();
db.ref('vault_meta').once('value', snapshot => {
  const hasMeta = !!snapshot.val();
  gt(hasMeta?'s-lock':'s-setup');
});
</script>
